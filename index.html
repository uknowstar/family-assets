<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="자산현황">
<meta name="theme-color" content="#1a1a18">
<link rel="manifest" href="manifest.json">
<title>우리집 자산 현황</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f4;
    --bg-tertiary: #eceae4;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --border: rgba(0,0,0,0.09);
    --border-md: rgba(0,0,0,0.16);
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2a2a27;
      --text-primary: #f0efe8;
      --text-secondary: #8a8a85;
      --border: rgba(255,255,255,0.08);
      --border-md: rgba(255,255,255,0.16);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; }
  .app { max-width: 980px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.75rem; flex-wrap: wrap; gap: 10px; }
  .header-left h1 { font-size: 21px; font-weight: 600; }
  .header-left .sub { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
  .snap-btn { padding: 9px 17px; background: var(--text-primary); color: var(--bg-primary); border: none; border-radius: var(--radius-md); font-size: 13px; cursor: pointer; font-weight: 500; }
  .snap-btn:hover { opacity: 0.82; }
  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  @media(max-width:620px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } }
  .metric-card { background: var(--bg-primary); border-radius: var(--radius-md); padding: 1rem 1.1rem; border: 0.5px solid var(--border); }
  .metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 7px; }
  .metric-value { font-size: 19px; font-weight: 600; line-height: 1.2; }
  .metric-sub { font-size: 11px; margin-top: 5px; }
  .up { color: #1D9E75; } .down { color: #D85A30; } .neutral { color: var(--text-secondary); }
  .tabs { display: flex; gap: 3px; margin-bottom: 1.1rem; background: var(--bg-secondary); padding: 4px; border-radius: var(--radius-md); width: fit-content; }
  .tab { padding: 7px 15px; border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--text-secondary); border: none; background: transparent; }
  .tab.active { background: var(--bg-primary); color: var(--text-primary); border: 0.5px solid var(--border-md); font-weight: 500; }
  .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media(max-width:640px) { .content-grid { grid-template-columns: 1fr; } }
  .full { grid-column: 1/-1; }
  .card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; }
  .card-title { font-size: 14px; font-weight: 500; margin-bottom: 13px; display: flex; justify-content: space-between; align-items: center; }
  .card-sub { font-size: 12px; font-weight: 400; color: var(--text-secondary); }
  .asset-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 0.5px solid var(--border); }
  .asset-row:last-child { border-bottom: none; }
  .asset-name { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .asset-right { text-align: right; }
  .asset-amt { font-size: 13px; font-weight: 500; }
  .asset-pct { font-size: 11px; color: var(--text-secondary); }
  .add-btn { width: 100%; padding: 9px; margin-top: 11px; font-size: 13px; cursor: pointer; border: 1px dashed var(--border-md); border-radius: var(--radius-md); background: transparent; color: var(--text-secondary); }
  .add-btn:hover { background: var(--bg-secondary); }
  .del-btn { border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 12px; opacity: 0.4; padding: 2px 6px; }
  .del-btn:hover { opacity:1; color:#D85A30; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 99px; white-space: nowrap; }
  .b-me    { background:#E6F1FB; color:#185FA5; }
  .b-wife  { background:#FBEAF0; color:#993556; }
  .b-joint { background:#EAF3DE; color:#3B6D11; }
  .b-debt  { background:#FCEBEB; color:#A32D2D; }
  .chart-wrap { position: relative; width: 100%; height: 220px; }
  .snap-header { display:grid; grid-template-columns:96px 1fr 110px 110px 48px; gap:8px; padding:6px 0; border-bottom:0.5px solid var(--border-md); font-size:11px; color:var(--text-secondary); font-weight:500; }
  .snap-row    { display:grid; grid-template-columns:96px 1fr 110px 110px 48px; gap:8px; align-items:center; padding:9px 0; border-bottom:0.5px solid var(--border); font-size:13px; }
  .snap-row:last-child { border-bottom:none; }
  @media(max-width:600px){ .snap-header,.snap-row { grid-template-columns:80px 1fr 90px 36px; } .snap-hide{display:none;} }
  .snap-bar { background:var(--bg-secondary); border-radius:3px; height:5px; overflow:hidden; }
  .snap-bar-fill { height:5px; border-radius:3px; background:#1D9E75; }
  .snap-date { color:var(--text-secondary); font-size:12px; }
  .snap-net { font-weight:500; }
  .detail-table { width:100%; border-collapse:collapse; font-size:13px; }
  .detail-table th { text-align:left; padding:6px 4px; font-weight:500; color:var(--text-secondary); font-size:11px; border-bottom:0.5px solid var(--border-md); }
  .detail-table td { padding:8px 4px; border-bottom:0.5px solid var(--border); vertical-align:middle; }
  .detail-table tr:last-child td { border-bottom:none; }
  .edit-inp { width:105px; padding:4px 6px; font-size:12px; border:0.5px solid var(--border-md); border-radius:4px; background:var(--bg-primary); color:var(--text-primary); text-align:right; }
  .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; z-index:100; align-items:flex-start; justify-content:center; padding-top:60px; }
  .modal-overlay.open { display:flex; }
  .modal-bg { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); }
  .modal { position:relative; background:var(--bg-primary); border-radius:var(--radius-lg); border:0.5px solid var(--border-md); padding:1.5rem; width:360px; max-width:92vw; z-index:1; }
  .modal h3 { font-size:15px; font-weight:600; margin-bottom:1rem; }
  .modal label { font-size:12px; color:var(--text-secondary); display:block; margin-bottom:4px; margin-top:10px; }
  .modal input,.modal select { width:100%; padding:8px 10px; font-size:13px; border:0.5px solid var(--border-md); border-radius:var(--radius-md); background:var(--bg-primary); color:var(--text-primary); }
  .modal-btns { display:flex; gap:8px; margin-top:16px; }
  .btn-primary { flex:1; padding:9px; background:var(--text-primary); color:var(--bg-primary); border:none; border-radius:var(--radius-md); font-size:13px; cursor:pointer; font-weight:500; }
  .btn-cancel  { flex:1; padding:9px; background:transparent; border:0.5px solid var(--border-md); border-radius:var(--radius-md); font-size:13px; cursor:pointer; color:var(--text-secondary); }
  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:var(--text-primary); color:var(--bg-primary); padding:10px 22px; border-radius:var(--radius-md); font-size:13px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:300; white-space:nowrap; }
  .toast.show { opacity:1; }
  .empty-state { text-align:center; padding:2.5rem 1rem; color:var(--text-secondary); font-size:13px; line-height:2; }
  .debt-divider { margin-top:12px; padding-top:10px; border-top:0.5px solid var(--border-md); }
  .debt-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; font-size:13px; }
  .cat-group { border-bottom:0.5px solid var(--border); padding:11px 0; }
  .cat-group:last-child { border-bottom:none; }
  .cat-group-header { display:flex; justify-content:space-between; align-items:center; }
  .cat-group-subs { display:flex; gap:14px; margin-top:8px; flex-wrap:wrap; }
  .sub-row { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-secondary); }
  .b-debt { background:#FCEBEB; color:#A32D2D; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-left">
      <h1>우리집 자산 현황</h1>
      <div class="sub" id="today-date"></div>
      <div id="crypto-updated" style="font-size:11px;color:#BA7517;margin-top:2px;"></div>
    </div>
    <button class="snap-btn" style="background:var(--bg-secondary);color:var(--text-secondary);border:0.5px solid var(--border-md);" onclick="fetchCryptoPrices()">🔄 코인 갱신</button>
    <button class="snap-btn" onclick="saveSnapshot()">📸 오늘 스냅샷 저장</button>
  </div>

  <div class="summary-grid">
    <div class="metric-card">
      <div class="metric-label">순자산 (부채 차감)</div>
      <div class="metric-value" id="sum-total">₩0</div>
      <div class="metric-sub neutral" id="sum-change">-</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">전일 대비</div>
      <div class="metric-value neutral" id="sum-diff">-</div>
      <div class="metric-sub neutral" id="sum-diff-pct">스냅샷 저장 후 확인</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">총 자산</div>
      <div class="metric-value" id="sum-gross">₩0</div>
      <div class="metric-sub down" id="sum-debt-lbl">대출: -</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">투자 자산 비중</div>
      <div class="metric-value" id="sum-invest-pct">0%</div>
      <div class="metric-sub neutral" id="sum-invest-amt">-</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">전체 현황</button>
    <button class="tab" onclick="switchTab('assets')">자산 관리</button>
    <button class="tab" onclick="switchTab('invest')">투자 수익</button>
    <button class="tab" onclick="switchTab('tracking')">일별 트래킹</button>
    <button class="tab" onclick="switchTab('chart')">추이 차트</button>
  </div>

  <div id="tab-overview">
    <div class="content-grid">
      <div class="card">
        <div class="card-title">자산 구성 <span class="card-sub">(부채 제외)</span></div>
        <div style="position:relative;width:100%;height:190px;"><canvas id="donut-chart"></canvas></div>
        <div id="donut-legend" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;font-size:11px;color:var(--text-secondary);"></div>
      </div>
      <div class="card">
        <div class="card-title">카테고리별</div>
        <div id="cat-list"></div>
        <div id="debt-summary"></div>
      </div>
      <div class="card full">
        <div class="card-title">전체 자산 목록</div>
        <div id="asset-list"></div>
        <button class="add-btn" onclick="openModal()">+ 자산 추가</button>
      </div>
    </div>
  </div>

  <div id="tab-assets" style="display:none">
    <div class="content-grid">
      <div class="card full">
        <div class="card-title">자산 상세 관리 <span class="card-sub">금액 클릭 후 수정 → Enter</span></div>
        <div id="detail-list"></div>
        <button class="add-btn" onclick="openModal()">+ 자산 추가</button>
      </div>
    </div>
  </div>

  <div id="tab-invest" style="display:none">
    <div class="content-grid">
      <div class="card full">
        <div class="card-title">투자 수익 요약</div>
        <div id="invest-summary" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;"></div>
      </div>
      <div class="card full">
        <div class="card-title">
          종목별 수익률
          <span class="card-sub">매주 캡처 업데이트 시 반영</span>
        </div>
        <div id="invest-owner-filter" style="display:flex;gap:6px;margin-bottom:12px;">
          <button class="of-btn active" data-owner="all">전체</button>
          <button class="of-btn" data-owner="me">남편</button>
          <button class="of-btn" data-owner="wife">아내</button>
        </div>
        <div id="invest-sort" style="display:flex;gap:6px;margin-bottom:12px;">
          <button class="of-btn active" data-sort="rate">수익률순</button>
          <button class="of-btn" data-sort="amount">평가금액순</button>
          <button class="of-btn" data-sort="profit">수익금액순</button>
        </div>
        <div id="invest-list"></div>
      </div>
    </div>
  </div>

  <div id="tab-tracking" style="display:none">
    <div class="content-grid">
      <div class="card full">
        <div class="card-title">일별 스냅샷 <span class="card-sub" id="snap-count"></span></div>
        <div class="snap-header">
          <span>날짜</span><span>비율</span><span>순자산</span>
          <span class="snap-hide">전일 대비</span><span></span>
        </div>
        <div id="snap-list"></div>
        <div id="snap-empty" class="empty-state" style="display:none">
          아직 저장된 스냅샷이 없어요.<br>상단의 "오늘 스냅샷 저장" 버튼을 눌러 시작해보세요.
        </div>
      </div>
    </div>
  </div>

  <div id="tab-chart" style="display:none">
    <div class="content-grid">
      <div class="card full">
        <div class="card-title">순자산 추이</div>
        <div class="chart-wrap"><canvas id="history-chart"></canvas></div>
      </div>
      <div class="card full">
        <div class="card-title">카테고리별 자산 추이</div>
        <div class="chart-wrap" style="height:260px;"><canvas id="stack-chart"></canvas></div>
      </div>
      <div id="chart-empty" class="card full empty-state" style="display:none">
        스냅샷이 2개 이상 있어야 추이 차트를 볼 수 있어요.
      </div>
    </div>
  </div>

<div class="modal-overlay" id="modal">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal">
    <h3>자산 추가</h3>
    <label>자산명</label>
    <input type="text" id="a-name" placeholder="예) 테슬라" />
    <label>카테고리</label>
    <select id="a-cat">
      <option value="주식/ETF">주식/ETF</option>
      <option value="예금/적금">예금/적금</option>
      <option value="현금">현금</option>
      <option value="가상화폐">가상화폐</option>
      <option value="부동산">부동산</option>
      <option value="자동차/기타">자동차/기타</option>
      <option value="대출/부채">대출/부채 (마이너스로 입력)</option>
    </select>
    <label>금액 (원 단위 / 대출은 마이너스로 입력)</label>
    <input type="text" inputmode="numeric" id="a-amount" placeholder="예) 36,947,192"
      onfocus="this.value=this.value.replace(/[^-0-9]/g,'')"
      onblur="if(this.value){const r=parseInt(this.value.replace(/[^-0-9]/g,''));this.value=(r<0?'-':'')+Math.abs(r).toLocaleString('ko-KR');}" />
    <label>소유자</label>
    <select id="a-owner">
      <option value="me">남편</option>
      <option value="wife">아내</option>
      <option value="joint">공동</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="addAsset()">추가</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
// ── Firebase SDK ──────────────────────────────────────────
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc,
         collection, getDocs, deleteDoc, onSnapshot }
                                                  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyBsdvbYOTNJTgRRZSaWv2Iq3ioJ2a6XLwI",
  authDomain:        "family-assets-75884.firebaseapp.com",
  projectId:         "family-assets-75884",
  storageBucket:     "family-assets-75884.firebasestorage.app",
  messagingSenderId: "316701409255",
  appId:             "1:316701409255:web:f6222acadcaeff32b70742"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// Firestore 경로
const ASSETS_DOC = doc(db, 'family', 'assets');
const SNAPS_COL  = collection(db, 'family', 'snapshots', 'items');

// ── 로컬 상태 ─────────────────────────────────────────────

const catColors = {
  '주식/ETF':   '#1D9E75',
  '예금/적금':  '#534AB7',
  '현금':       '#D85A30',
  '가상화폐':   '#BA7517',
  '부동산':     '#378ADD',
  '자동차/기타':'#888780',
  '대출/부채':  '#A32D2D',
};
const ownerLabel = { me:'남편', wife:'아내', joint:'공동' };

let assets = [];
let snapshots = [];
let donutChart = null, histChart = null, stackChart = null;

// ── 과거 히스토리 스냅샷 시딩 ────────────────────────────
const HISTORICAL_SNAPS = [
  {
    date: '2025-06-24',
    net:   65961.7711,
    gross: 115552.9112,
    debt:  -49591.14,
    cats: {
      '현금':      3979.6632,
      '예금/적금': 4088.6762,
      '주식/ETF':  15031.6346,
      '부동산':    90750,
    }
  },
  {
    date: '2025-07-03',
    net:   64761.4287,
    gross: 114199.6002,
    debt:  -49438.1715,
    cats: {
      '현금':      6144.0622,
      '예금/적금': 4086.4262,
      '주식/ETF':  13054.8887,
      '부동산':    90750,
    }
  },
  {
    date: '2025-07-08',
    net:   64818.3547,
    gross: 114282.5361,
    debt:  -49464.1814,
    cats: {
      '현금':      4527.443,
      '예금/적금': 4084.4162,
      '주식/ETF':  14741.2252,
      '부동산':    90750,
    }
  },
  {
    date: '2025-07-11',
    net:   65246.2051,
    gross: 114711.9265,
    debt:  -49465.7214,
    cats: {
      '현금':      3995.6534,
      '예금/적금': 4087.9162,
      '주식/ETF':  15698.9052,
      '부동산':    90750,
    }
  },
  {
    date: '2025-07-15',
    net:   66207.3141,
    gross: 115682.7866,
    debt:  -49475.4725,
    cats: {
      '현금':      4084.428,
      '예금/적금': 4085.7162,
      '주식/ETF':  15836.7883,
      '부동산':    91500,
    }
  },
];

async function seedHistoricalSnaps() {
  for (const snap of HISTORICAL_SNAPS) {
    const ref = doc(db, 'family', 'snapshots', 'items', snap.date);
    await setDoc(ref, snap); // 항상 덮어쓰기 (단위 수정 반영)
  }
}

async function loadData() {
  showToast('데이터 불러오는 중...');
  try {
    await seedHistoricalSnaps();
    const aSnap = await getDoc(ASSETS_DOC);
    assets = aSnap.exists() ? aSnap.data().list : defaultAssets();
    const sSnap = await getDocs(SNAPS_COL);
    snapshots = sSnap.docs.map(d=>d.data()).sort((a,b)=>a.date.localeCompare(b.date));
  } catch(e) {
    console.error(e);
    assets = defaultAssets();
    snapshots = [];
    showToast('⚠️ Firebase 연결 실패 — 로컬 데이터로 표시합니다');
  }
  renderAll();
}

const CRYPTO_HOLDINGS = {
  'KRW-BTC': { id: 15, qty: 0.03071389,  name: '비트코인' },
  'KRW-ETH': { id: 16, qty: 0.57969936,  name: '이더리움' },
  'KRW-SOL': { id: 17, qty: 5.31128436,  name: '솔라나' },
  'KRW-XRP': { id: 18, qty: 197.56725405, name: '리플' },
};

let cryptoLastUpdated = null;

async function fetchCryptoPrices() {
  try {
    const tickers = Object.keys(CRYPTO_HOLDINGS).join(',');
    const res = await fetch(`https://api.upbit.com/v1/ticker?markets=${tickers}`);
    if (!res.ok) throw new Error('업비트 API 오류');
    const data = await res.json();

    let updated = false;
    data.forEach(item => {
      const holding = CRYPTO_HOLDINGS[item.market];
      if (!holding) return;
      const newAmount = (item.trade_price * holding.qty) / 10000; // 원 → 만원
      const asset = assets.find(a => a.id === holding.id);
      if (asset && Math.abs(asset.amount - newAmount) > 0.01) {
        asset.amount = Math.round(newAmount * 10000) / 10000;
        updated = true;
      }
    });

    if (updated) {
      cryptoLastUpdated = new Date();
      updateCryptoTimestamp();
      updateSummary(); updateDonut(); updateCatList(); updateAssetList();
      if (document.getElementById('tab-invest').style.display !== 'none') updateInvestTab();
    }
  } catch(e) {
    console.warn('가상화폐 가격 조회 실패:', e.message);
  }
}

function updateCryptoTimestamp() {
  const el = document.getElementById('crypto-updated');
  if (el && cryptoLastUpdated) {
    el.textContent = '코인 ' + cryptoLastUpdated.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}) + ' 업데이트';
  }
}

function calcNet(arr)   { return arr.reduce((s,a)=>s+a.amount, 0); }
function calcGross(arr) { return arr.filter(a=>a.amount>0).reduce((s,a)=>s+a.amount, 0); }
function calcDebt(arr)  { return arr.filter(a=>a.amount<0).reduce((s,a)=>s+a.amount, 0); }

function fmt(v) {
  const abs = Math.abs(v);
  let str;
  if      (abs >= 10000) str = (abs/10000).toFixed(2).replace(/\.?0+$/,'') + '억';
  else if (abs >= 1)     str = abs.toFixed(1).replace(/\.0$/,'').replace(/\B(?=(\d{3})+(?!\d))/g,',') + '만';
  else                   str = Math.round(abs*10000).toLocaleString() + '원';
  return (v < 0 ? '-' : '') + str;
}
function fmtW(v) { return '₩' + fmt(v); }
function fmtDiff(v) {
  if (Math.abs(v) < 0.001) return { text:'변동없음', cls:'neutral' };
  return { text:(v>0?'+':'')+fmt(v), cls:v>0?'up':'down' };
}

function updateSummary() {
  const net   = calcNet(assets);
  const gross = calcGross(assets);
  const debt  = calcDebt(assets);
  const invest = assets.filter(a=>['주식/ETF','가상화폐'].includes(a.cat)&&a.amount>0).reduce((s,a)=>s+a.amount,0);

  document.getElementById('sum-total').textContent      = fmtW(net);
  document.getElementById('sum-gross').textContent      = fmtW(gross);
  document.getElementById('sum-debt-lbl').textContent   = '대출: ' + fmtW(debt);
  document.getElementById('sum-invest-pct').textContent = gross ? Math.round(invest/gross*100)+'%' : '0%';
  document.getElementById('sum-invest-amt').textContent = fmtW(invest) + ' 투자중';

  if (snapshots.length) {
    const prev = snapshots[snapshots.length-1];
    const diff = net - prev.net;
    const d    = fmtDiff(diff);
    const pct  = prev.net ? ((diff/Math.abs(prev.net))*100).toFixed(2) : '0';
    const el   = document.getElementById('sum-diff');
    el.textContent = d.text; el.className = 'metric-value ' + d.cls;
    document.getElementById('sum-diff-pct').textContent = prev.date + ' 대비 ' + (diff>=0?'+':'') + pct + '%';
    document.getElementById('sum-change').textContent   = '최근 저장: ' + prev.date;
  } else {
    document.getElementById('sum-diff').textContent     = '-';
    document.getElementById('sum-diff').className       = 'metric-value neutral';
    document.getElementById('sum-diff-pct').textContent = '스냅샷 저장 후 확인';
    document.getElementById('sum-change').textContent   = '스냅샷 없음';
  }
}

function updateDonut() {
  const pos = assets.filter(a=>a.amount>0);
  const catMap = {};
  pos.forEach(a=>{ catMap[a.cat]=(catMap[a.cat]||0)+a.amount; });
  const labels = Object.keys(catMap);
  const data   = labels.map(k=>catMap[k]);
  const colors = labels.map(k=>catColors[k]||'#888');
  const total  = data.reduce((s,v)=>s+v,0);

  document.getElementById('donut-legend').innerHTML = labels.map((l,i)=>
    `<span style="display:flex;align-items:center;gap:4px;">
      <span style="width:10px;height:10px;border-radius:2px;background:${colors[i]};flex-shrink:0;"></span>
      ${l} ${Math.round(data[i]/total*100)}%
    </span>`).join('');

  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donut-chart'), {
    type:'doughnut',
    data:{ labels, datasets:[{ data, backgroundColor:colors, borderWidth:2, borderColor:'rgba(255,255,255,0.3)' }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'65%',
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:c=>' '+fmtW(c.raw) } } } }
  });
}

function updateCatList() {
  const pos = assets.filter(a=>a.amount>0);
  const catMap = {};
  pos.forEach(a=>{ catMap[a.cat]=(catMap[a.cat]||0)+a.amount; });
  const total = Object.values(catMap).reduce((s,v)=>s+v,0);
  document.getElementById('cat-list').innerHTML = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>`
    <div class="asset-row">
      <div class="asset-name"><span class="dot" style="background:${catColors[cat]||'#888'}"></span>${cat}</div>
      <div class="asset-right">
        <div class="asset-amt">${fmtW(amt)}</div>
        <div class="asset-pct">${Math.round(amt/total*100)}%</div>
      </div>
    </div>`).join('');

  const debts = assets.filter(a=>a.amount<0);
  const debtEl = document.getElementById('debt-summary');
  debtEl.innerHTML = debts.length ? `<div class="debt-divider">${debts.map(d=>`
    <div class="debt-row">
      <span style="display:flex;align-items:center;gap:7px;color:var(--text-secondary);">
        <span class="dot" style="background:#A32D2D"></span>${d.name}
      </span>
      <span style="color:#A32D2D;font-weight:500;">${fmtW(d.amount)}</span>
    </div>`).join('')}</div>` : '';
}

function updateAssetList() {
  // 카테고리 × 소유자 로 묶어서 표시
  const gross = calcGross(assets);
  const cats = ['부동산','주식/ETF','예금/적금','현금','가상화폐','자동차/기타','대출/부채'];
  let html = '';
  cats.forEach(cat => {
    const items = assets.filter(a=>a.cat===cat);
    if (!items.length) return;
    const catTotal = items.reduce((s,a)=>s+a.amount,0);
    const meAmt    = items.filter(a=>a.owner==='me'   ).reduce((s,a)=>s+a.amount,0);
    const wifeAmt  = items.filter(a=>a.owner==='wife' ).reduce((s,a)=>s+a.amount,0);
    const jointAmt = items.filter(a=>a.owner==='joint').reduce((s,a)=>s+a.amount,0);
    const isDebt   = cat === '대출/부채';
    const pct      = gross>0 && !isDebt ? Math.round(Math.abs(catTotal)/gross*100) : null;
    html += `
    <div class="cat-group">
      <div class="cat-group-header">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="dot" style="background:${catColors[cat]||'#888'};width:10px;height:10px;"></span>
          <span style="font-weight:500;font-size:14px;">${cat}</span>
        </div>
        <div style="text-align:right;">
          <div style="font-size:14px;font-weight:500;color:${isDebt?'#A32D2D':'var(--text-primary)'};">${fmtW(catTotal)}</div>
          ${pct!==null?`<div style="font-size:11px;color:var(--text-secondary);">${pct}%</div>`:''}
        </div>
      </div>
      <div class="cat-group-subs">
        ${meAmt    ? `<div class="sub-row"><span class="badge b-me">남편</span><span>${fmtW(meAmt)}</span></div>` : ''}
        ${wifeAmt  ? `<div class="sub-row"><span class="badge b-wife">아내</span><span>${fmtW(wifeAmt)}</span></div>` : ''}
        ${jointAmt ? `<div class="sub-row"><span class="badge b-joint">공동</span><span>${fmtW(jointAmt)}</span></div>` : ''}
      </div>
    </div>`;
  });
  document.getElementById('asset-list').innerHTML = html;
}

function wonToMan(won) { return won / 10000; }
function manToWon(man) { return Math.round(man * 10000); }
function fmtWon(man) {
  const won = Math.round(man * 10000);
  return (won < 0 ? '-' : '') + Math.abs(won).toLocaleString('ko-KR');
}

// ── 투자 탭 상태 ──────────────────────────────────────────
let investOwnerFilter = 'all';
let investSortKey = 'rate';

function updateInvestTab() {
  const investAssets = assets.filter(a =>
    (a.cat === '주식/ETF' || a.cat === '가상화폐') && a.amount > 0
  );
  const filtered = investOwnerFilter === 'all'
    ? investAssets
    : investAssets.filter(a => a.owner === investOwnerFilter);

  const withData  = filtered.filter(a => a.profit !== undefined);
  const totalVal  = filtered.reduce((s,a) => s + a.amount, 0);
  const totalProfit = withData.reduce((s,a) => s + (a.profit||0), 0);
  const totalCost   = withData.reduce((s,a) => s + (a.amount - (a.profit||0)), 0);
  const totalRate   = totalCost > 0 ? (totalProfit / totalCost * 100) : 0;
  const winners = withData.filter(a => a.profit > 0).length;
  const losers  = withData.filter(a => a.profit < 0).length;

  // 요약 카드
  document.getElementById('invest-summary').innerHTML = `
    <div class="metric-card">
      <div class="metric-label">총 평가금액</div>
      <div class="metric-value">${fmtW(totalVal)}</div>
      <div class="metric-sub neutral">${filtered.length}개 종목</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">총 수익금액</div>
      <div class="metric-value ${totalProfit >= 0 ? 'up' : 'down'}">${totalProfit >= 0 ? '+' : ''}${fmtW(totalProfit)}</div>
      <div class="metric-sub ${totalProfit >= 0 ? 'up' : 'down'}">${totalRate >= 0 ? '+' : ''}${totalRate.toFixed(2)}%</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">수익 / 손실 종목</div>
      <div class="metric-value"><span class="up">+${winners}</span> / <span class="down">-${losers}</span></div>
      <div class="metric-sub neutral">수익률 데이터 ${withData.length}개</div>
    </div>`;

  // 정렬
  const sorted = [...filtered].sort((a, b) => {
    const ar = a.rate  ?? 0, br = b.rate  ?? 0;
    const ap = a.profit ?? 0, bp = b.profit ?? 0;
    if (investSortKey === 'rate')   return br - ar;
    if (investSortKey === 'amount') return b.amount - a.amount;
    if (investSortKey === 'profit') return bp - ap;
    return 0;
  });

  // 종목 목록
  document.getElementById('invest-list').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 55px 120px 120px 110px;gap:0;padding:6px 8px;border-bottom:0.5px solid var(--border-md);">
      <span style="font-size:11px;color:var(--text-secondary);font-weight:500;">종목명</span>
      <span style="font-size:11px;color:var(--text-secondary);font-weight:500;">소유</span>
      <span style="font-size:11px;color:var(--text-secondary);font-weight:500;text-align:right;">평가금액</span>
      <span style="font-size:11px;color:var(--text-secondary);font-weight:500;text-align:right;">수익금액</span>
      <span style="font-size:11px;color:var(--text-secondary);font-weight:500;text-align:right;">수익률</span>
    </div>
    ${sorted.map(a => {
      const profit = a.profit;
      const rate   = a.rate;
      const hasData = profit !== undefined && rate !== undefined;
      const cls = !hasData ? 'neutral' : profit >= 0 ? 'up' : 'down';
      return `
      <div style="display:grid;grid-template-columns:1fr 55px 120px 120px 110px;gap:0;align-items:center;padding:8px 8px;border-bottom:0.5px solid var(--border);">
        <span style="font-size:13px;display:flex;align-items:center;gap:6px;min-width:0;">
          <span class="dot" style="background:${catColors[a.cat]||'#888'};flex-shrink:0;"></span>
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${a.name}</span>
        </span>
        <span><span class="badge ${a.owner==='wife'?'b-wife':a.owner==='joint'?'b-joint':'b-me'}">${ownerLabel[a.owner]}</span></span>
        <span style="text-align:right;font-size:13px;font-weight:500;">${fmtW(a.amount)}</span>
        <span style="text-align:right;font-size:13px;font-weight:500;" class="${cls}">
          ${hasData ? (profit >= 0 ? '+' : '') + fmtW(profit) : '-'}
        </span>
        <span style="text-align:right;">
          ${hasData
            ? `<span style="font-size:13px;font-weight:500;" class="${cls}">${rate >= 0 ? '+' : ''}${rate.toFixed(2)}%</span>`
            : `<span style="font-size:12px;color:var(--text-secondary);">-</span>`}
        </span>
      </div>`;
    }).join('')}`;
}

function filterInvestOwner(o) {
  investOwnerFilter = o;
  document.querySelectorAll('#invest-owner-filter .of-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.owner === o);
  });
  updateInvestTab();
}

function sortInvest(key) {
  investSortKey = key;
  document.querySelectorAll('#invest-sort .of-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.sort === key);
  });
  updateInvestTab();
}

// 투자 탭 버튼 이벤트 리스너 등록
function initInvestListeners() {
  document.querySelectorAll('#invest-owner-filter .of-btn').forEach(btn => {
    btn.addEventListener('click', () => filterInvestOwner(btn.dataset.owner));
  });
  document.querySelectorAll('#invest-sort .of-btn').forEach(btn => {
    btn.addEventListener('click', () => sortInvest(btn.dataset.sort));
  });
}

function updateDetailList() {
  document.getElementById('detail-list').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 90px 60px 160px 36px;gap:0;border-bottom:0.5px solid var(--border-md);padding:6px 8px;">
      <span style="font-size:11px;color:var(--text-secondary);font-weight:500;">자산명</span>
      <span style="font-size:11px;color:var(--text-secondary);font-weight:500;">카테고리</span>
      <span style="font-size:11px;color:var(--text-secondary);font-weight:500;">소유</span>
      <span style="font-size:11px;color:var(--text-secondary);font-weight:500;text-align:right;padding-right:8px;">금액 (원)</span>
      <span></span>
    </div>
    ${assets.map(a=>`
    <div style="display:grid;grid-template-columns:1fr 90px 60px 160px 36px;gap:0;align-items:center;padding:7px 8px;border-bottom:0.5px solid var(--border);">
      <span style="font-size:13px;display:flex;align-items:center;gap:6px;min-width:0;">
        <span class="dot" style="background:${catColors[a.cat]||'#888'};flex-shrink:0;"></span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${a.name}</span>
      </span>
      <span style="font-size:11px;color:var(--text-secondary);">${a.cat}</span>
      <span><span class="badge ${a.cat==='대출/부채'?'b-debt':a.owner==='wife'?'b-wife':a.owner==='joint'?'b-joint':'b-me'}">${a.cat==='대출/부채'?'부채':ownerLabel[a.owner]}</span></span>
      <span style="text-align:right;padding-right:4px;">
        <input class="edit-inp" type="text" inputmode="numeric"
          value="${fmtWon(a.amount)}"
          style="color:${a.amount<0?'#A32D2D':'var(--text-primary)'};width:150px;text-align:right;"
          onfocus="this.value=this.value.replace(/[^-0-9]/g,'')"
          onblur="formatInp(this)"
          onchange="updateAmtWon(${a.id}, this.value)" />
      </span>
      <span style="text-align:right;"><button class="del-btn" onclick="removeAsset(${a.id})">삭제</button></span>
    </div>`).join('')}`;
}

function formatInp(el) {
  const raw = parseInt(el.value.replace(/[^-0-9]/g,'')) || 0;
  el.value = raw === 0 ? '' : (raw < 0 ? '-' : '') + Math.abs(raw).toLocaleString('ko-KR');
}

async function updateAmtWon(id, val) {
  const a = assets.find(a=>a.id===id);
  if (!a) return;
  const won = parseInt(val.replace(/[^-0-9]/g,'')) || 0;
  a.amount = wonToMan(won);
  await saveAssets(); updateSummary(); updateDonut(); updateCatList(); updateAssetList();
}

function updateSnaps() {
  const list  = document.getElementById('snap-list');
  const empty = document.getElementById('snap-empty');
  document.getElementById('snap-count').textContent = snapshots.length + '개 저장됨';
  if (!snapshots.length) { list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  const maxNet = Math.max(...snapshots.map(s=>s.net));
  list.innerHTML = [...snapshots].reverse().map((s,i,arr)=>{
    const prev = arr[i+1];
    const diff = prev ? fmtDiff(s.net - prev.net) : null;
    const barW = maxNet>0 ? Math.round(Math.max(s.net,0)/maxNet*100) : 0;
    return `<div class="snap-row">
      <span class="snap-date">${s.date}</span>
      <span><div class="snap-bar"><div class="snap-bar-fill" style="width:${barW}%"></div></div></span>
      <span class="snap-net">${fmtW(s.net)}</span>
      <span class="snap-hide" style="font-size:12px;">${diff?`<span class="${diff.cls}">${diff.text}</span>`:'-'}</span>
      <span><button class="del-btn" onclick="deleteSnap('${s.date}')">삭제</button></span>
    </div>`;
  }).join('');
}

function updateCharts() {
  const emptyEl = document.getElementById('chart-empty');
  if (snapshots.length < 2) { emptyEl.style.display='block'; return; }
  emptyEl.style.display = 'none';
  const labels = snapshots.map(s=>s.date);
  const nets   = snapshots.map(s=>s.net);

  if (histChart) histChart.destroy();
  histChart = new Chart(document.getElementById('history-chart'), {
    type:'line',
    data:{ labels, datasets:[{ label:'순자산', data:nets, borderColor:'#1D9E75', backgroundColor:'rgba(29,158,117,0.08)', fill:true, tension:0.4, pointRadius:4, pointBackgroundColor:'#1D9E75' }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:c=>' '+fmtW(c.raw) } } },
      scales:{ y:{ ticks:{ callback:v=>fmtW(v), font:{size:11} }, grid:{color:'rgba(128,128,128,0.07)'} }, x:{ ticks:{font:{size:11}}, grid:{display:false} } } }
  });

  const cats = [...new Set(snapshots.flatMap(s=>Object.keys(s.cats||{})))];
  if (stackChart) stackChart.destroy();
  stackChart = new Chart(document.getElementById('stack-chart'), {
    type:'bar',
    data:{ labels, datasets: cats.map(cat=>({ label:cat, data:snapshots.map(s=>(s.cats||{})[cat]||0), backgroundColor:(catColors[cat]||'#888')+'CC', stack:'s' })) },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:true, position:'bottom', labels:{ font:{size:11}, boxWidth:12, padding:12 } }, tooltip:{ callbacks:{ label:c=>' '+c.dataset.label+': '+fmtW(c.raw) } } },
      scales:{ x:{ stacked:true, ticks:{font:{size:11}}, grid:{display:false} }, y:{ stacked:true, ticks:{ callback:v=>fmtW(v), font:{size:11} }, grid:{color:'rgba(128,128,128,0.07)'} } } }
  });
}

async function saveSnapshot() {
  const dateStr = new Date().toISOString().slice(0,10);
  const net   = calcNet(assets);
  const gross = calcGross(assets);
  const debt  = calcDebt(assets);
  const cats  = {};
  assets.filter(a=>a.amount>0).forEach(a=>{ cats[a.cat]=(cats[a.cat]||0)+a.amount; });
  const snap = { date:dateStr, net, gross, debt, cats };
  const exists = snapshots.findIndex(s=>s.date===dateStr) >= 0;
  await saveSnap(snap);
  showToast(exists ? '오늘 스냅샷을 업데이트했어요' : '스냅샷 저장 완료 (' + dateStr + ')');
}

async function deleteSnap(date) {
  if (!confirm(date + ' 스냅샷을 삭제할까요?')) return;
  await deleteSnapFromDB(date);
}

function openModal()  { document.getElementById('modal').classList.add('open'); }
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('a-name').value = '';
  document.getElementById('a-amount').value = '';
}
async function addAsset() {
  const name   = document.getElementById('a-name').value.trim();
  const cat    = document.getElementById('a-cat').value;
  const raw    = document.getElementById('a-amount').value.replace(/[^-0-9]/g,'');
  const won    = parseInt(raw);
  const owner  = document.getElementById('a-owner').value;
  if (!name || isNaN(won)) { showToast('자산명과 금액을 입력해주세요'); return; }
  assets.push({ id:Date.now(), name, cat, amount: wonToMan(won), owner });
  await saveAssets(); closeModal(); renderAll();
  showToast(name + ' 추가됐어요');
}
async function removeAsset(id) {
  const a = assets.find(a=>a.id===id);
  if (!a || !confirm(`"${a.name}"을 삭제할까요?`)) return;
  assets = assets.filter(a=>a.id!==id);
  await saveAssets(); renderAll();
}
async function updateAmt(id, val) {
  const a = assets.find(a=>a.id===id);
  if (!a) return;
  a.amount = parseFloat(val) || 0;
  await saveAssets(); updateSummary(); updateDonut(); updateCatList(); updateAssetList();
}

function switchTab(tab) {
  ['overview','assets','invest','tracking','chart'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===tab ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active', ['overview','assets','invest','tracking','chart'][i]===tab);
  });
  if (tab==='chart')    setTimeout(updateCharts, 60);
  if (tab==='tracking') updateSnaps();
  if (tab==='assets')   updateDetailList();
  if (tab==='invest')   { initInvestListeners(); updateInvestTab(); }
}

function renderAll() {
  updateSummary(); updateDonut(); updateCatList(); updateAssetList(); updateDetailList(); updateSnaps();
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

document.getElementById('today-date').textContent =
  new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
loadData().then(() => {
  startRealtimeSync();
  startCryptoPricePolling();
});

// ── onclick에서 호출되는 함수들을 전역으로 등록 ──────────────
window.switchTab          = switchTab;
window.saveSnapshot       = saveSnapshot;
window.fetchCryptoPrices  = fetchCryptoPrices;
window.openModal          = openModal;
window.closeModal         = closeModal;
window.addAsset           = addAsset;
window.removeAsset        = removeAsset;
window.updateAmt          = updateAmt;
window.updateAmtWon       = updateAmtWon;
window.formatInp          = formatInp;
window.deleteSnap         = deleteSnap;
window.filterOwner        = filterOwner;
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/family-assets/sw.js')
      .then(() => console.log('SW 등록 완료'))
      .catch(e => console.log('SW 등록 실패', e));
  });
}
</script>
